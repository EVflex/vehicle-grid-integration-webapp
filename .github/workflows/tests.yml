---
# CHANGES (see CHANGES.md at the repository root):
# - Python 3.8 (end-of-life) -> matrix of 3.11 and 3.14, the extremes of the
#   supported range in vgi_api/pyproject.toml (§12 migration).
# - actions/checkout@v2, setup-python@v1 and cache@v2 are deprecated and
#   scheduled for removal on GitHub-hosted runners; bumped to current majors.
# - Removed the NETWORKS_DATA_CONTAINER_* secrets from the test step: the
#   blob-storage code path was deleted (network models ship in the package),
#   so the tests no longer need any credentials.
name: api-unittests
on:
  # Only runs on PRs to main to cut down on minutes used...
  pull_request:
    branches:
      - main
  # ...or when a PR is merged into main.
  # We want it to run on main because then the
  # cache can be used in other branches.
  push:
    branches:
      - main
jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./vgi_api
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.14"]
      fail-fast: false

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Bootstrap poetry
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install poetry

    - name: Configure poetry
      shell: bash
      run: |
        python -m poetry config virtualenvs.in-project true
        python -m poetry config virtualenvs.create true

    - name: Set up cache
      uses: actions/cache@v4
      id: cache
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}

    - name: Install dependencies
      shell: bash
      run: |
        python -m poetry env use ${{ matrix.python-version }}
        python -m poetry install

    - name: Display Python version
      run: poetry run python -c "import sys; print(sys.version)"

    - name: Run API unit tests
      run: |
        python -m poetry run pytest tests
